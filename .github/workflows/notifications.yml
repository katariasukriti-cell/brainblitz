name: BrainBlitz Notifications

on:
  schedule:
    # Runs every 15 minutes
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub dashboard

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send BrainBlitz Notifications
