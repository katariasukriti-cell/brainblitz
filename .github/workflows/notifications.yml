          async function sendNotification(payload) {
            const response = await fetch('https://onesignal.com/api/v1/notifications', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Key ${REST_KEY}`
              },
              body: JSON.stringify({ app_id: APP_ID, ...payload })
            });
            const result = await response.json();
            console.log('Sent:', payload.headings?.en, '| Status:', response.status, '| Result:', JSON.stringify(result).slice(0, 200));
            if (result.errors && result.errors.length > 0) {
              console.error('OneSignal error:', JSON.stringify(result.errors));
            }
            return result;
          }

          async function main() {
            const now = new Date();
            const utcHour = now.getUTCHours();

            // Get day of year for fact rotation
            const start = new Date(now.getUTCFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            const fact = FACTS[dayOfYear % FACTS.length];

            console.log(`UTC hour: ${utcHour} | Day of year: ${dayOfYear}`);

            // 1. PERSONALISED FACT OF THE DAY
            // Send to users whose preferred UTC hour matches — web_push_topic ensures
            // repeated sends within the hour replace rather than stack on the device
            await sendNotification({
              filters: [
                { field: 'tag', key: 'notif_utc_hour', relation: '=', value: String(utcHour) },
                { operator: 'AND' },
                { field: 'tag', key: 'notif_enabled',  relation: '=', value: 'true' }
              ],
              web_push_topic: 'daily-fact',
              headings: { en: '🧠 BrainBlitz — Fact of the Day' },
              contents: { en: fact },
              url: 'https://brainblitz-gules.vercel.app'
            });

            // 2. DAILY QUIZ REMINDER — sent at 9am Sydney time
            // Sydney is UTC+10 (AEST winter) or UTC+11 (AEDT summer)
            // Check actual Sydney time to handle DST correctly
            const sydneyTime = new Date(now.toLocaleString('en-US', { timeZone: 'Australia/Sydney' }));
            const sydneyHour = sydneyTime.getHours();
            const sydneyMinute = sydneyTime.getMinutes();

            if (sydneyHour === 9 && sydneyMinute < 60) {
              await sendNotification({
                included_segments: ['Subscribed Users'],
                headings: { en: '⚡ Daily Challenge Ready' },
